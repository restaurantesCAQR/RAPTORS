<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raptors Restaurant</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
color:white;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.85)),
url("jurasico.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

.overlay{
width:100%;
max-width:1100px;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:100%;
max-width:420px;
padding:28px 22px;

border-radius:22px;

background:rgba(0,0,0,0.35);
backdrop-filter: blur(4px);

box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

.logo{
width:150px;
margin:0 auto 25px auto;
display:block;
}

.buttons{
display:flex;
flex-direction:column;
gap:14px;
}

.btn{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:100%;
padding:16px;

border-radius:14px;

border:2px solid #d4af37;

background:rgba(0,0,0,0.45);

color:#f1c40f;
text-decoration:none;
font-size:16px;
font-weight:bold;

transition:all .25s;
}

.btn i{
font-size:18px;
}

.btn:hover{
transform:translateY(-2px);
background:rgba(212,175,55,0.12);
box-shadow:0 0 18px rgba(212,175,55,0.25);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.8;
}

/* Desktop */

@media (min-width:768px){

.card{
max-width:500px;
padding:40px;
}

.logo{
width:190px;
}

.btn{
font-size:18px;
padding:18px;
}

}

</style>

</head>

<body>

<div class="overlay">

<div class="card">

<img src="LOGO.png" class="logo" alt="Raptors">

<div class="buttons">

<a class="btn" href="https://qrco.de/be76ZY?fbclid=PAdGRleAQdjZxleHRuA2FlbQIxMQBzcnRjBmFwcF9pZA8xMjQwMjQ1NzQyODc0MTQAAacw5DrtuIvFOGF3sqwwq4TMoX5BsrEVrvehdWdToeZ2MIHoOgiA5LRYazwDCg_aem_MZb9ll03779PF_YJAjMwbg&utm_source=ig&utm_medium=social&utm_content=link_in_bio" target="_blank">
<i class="fa-solid fa-book-open"></i>
Menú
</a>

<a class="btn" href="https://www.degustapanama.com/panama/restaurante/raptors_108610.html" target="_blank">
<i class="fa-solid fa-utensils"></i>
Degusta
</a>

<a class="btn" href="https://www.instagram.com/raptorspty/" target="_blank">
<i class="fa-brands fa-instagram"></i>
Instagram
</a>

<a class="btn" href="https://www.facebook.com/raptorspanama/" target="_blank">
<i class="fa-brands fa-facebook"></i>
Facebook
</a>

<a class="btn" href="https://wa.me/50766443464" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
WhatsApp
</a>

</div>

<div class="footer">
Raptors
</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Raptors Restaurant</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
    url("jurasico.jpg");
    background-size:cover;
    background-position:center;
    height:100vh;
    color:white;
    text-align:center;
}

.container{
    padding-top:60px;
}

.logo{
    width:320px;
    margin-bottom:40px;
}

.buttons{
    width:400px;
    margin:auto;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;

    margin:25px auto;
    padding:20px;

    border-radius:14px;
    border:2px solid #FFD700;

    color:#FFD700;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;

    background:rgba(0,0,0,0.6);

    transition:0.3s;
}

.btn i{
    font-size:26px;
}

.btn:hover{
    background:#FFD700;
    color:black;
    transform:scale(1.05);
}

footer{
    margin-top:60px;
    opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="buttons">

<a class="btn" href="https://www.instagram.com/raptorspty/" target="_blank">
<i class="fa-brands fa-instagram"></i>
Instagram
</a>

<a class="btn" href="https://www.facebook.com/raptorspanama/" target="_blank">
<i class="fa-brands fa-facebook"></i>
Facebook
</a>

<a class="btn" href="https://wa.me/NUMERO_AQUI" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
WhatsApp
</a>

</div>

<footer>
Raptors
</footer>

</div>

</body>
</html>
